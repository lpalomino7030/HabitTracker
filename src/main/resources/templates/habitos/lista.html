<!doctype html>
<html
  lang="es"
  xmlns:th="http://www.thymeleaf.org"
  th:replace="layout :: layout (~{::title}, ~{::section}, ~{::script})"
>
  <head>
    <title>Hábitos</title>
  </head>

  <body>
    <script th:fragment="script">
      document.addEventListener("DOMContentLoaded", function () {
        let contadorPorHabito = {};

        document.querySelectorAll(".btn-marcar").forEach((btn) => {
          btn.addEventListener("click", function (e) {
            e.preventDefault();

            const id = this.getAttribute("data-id");

            fetch(`/habitos/marcar/${id}`)
              .then((res) => res.json())
              .then((data) => {
                actualizarSemana(id, data);

                if (!contadorPorHabito[id]) {
                  contadorPorHabito[id] = 0;
                }

                contadorPorHabito[id]++;
                mostrarToast(contadorPorHabito[id]);

                if (contadorPorHabito[id] === 7) {
                  lanzarConfetti();
                  contadorPorHabito = {};
                }
              });
          });
        });
        function actualizarSemana(habitoId, dias) {
          const contenedor = document.querySelector(
            `.weekHabitsBx[data-id="${habitoId}"]`,
          );

          if (!contenedor) return;

          contenedor.innerHTML = "";

          dias.forEach((dia) => {
            const item = document.createElement("div");
            item.className = "spancircleItem";

            const span = document.createElement("span");
            span.className = dia.completado ? "circle active" : "circle";

            const p = document.createElement("p");
            p.innerText = dia.dia;

            item.appendChild(span);
            item.appendChild(p);

            contenedor.appendChild(item);
          });
        }
        function mostrarToast(num) {
          const toast = document.createElement("div");
          toast.className = "toast-msg";
          toast.innerText = `🔥 Progreso registrado (${num})`;

          document.body.appendChild(toast);

          setTimeout(() => toast.remove(), 2000);
        }

        function lanzarConfetti() {
          const count = 400;
          const defaults = {
            origin: { y: 0 },
          };

          function fire(particleRatio, opts) {
            confetti({
              ...defaults,
              ...opts,
              particleCount: Math.floor(count * particleRatio),
            });
          }

          fire(0.25, { spread: 26, startVelocity: 55 });
          fire(0.2, { spread: 60 });
          fire(0.35, { spread: 100, decay: 0.91 });
          fire(0.1, { spread: 120, startVelocity: 25 });
          fire(0.1, { spread: 120, startVelocity: 45 });
        }
      });
    </script>

    <section class="HabitView">
      <div class="HabitListBox">
        <div class="tituloLista">
          <h3>Mis Hábitos</h3>
          <a th:href="@{/habitos/nuevo}" class="btn btn-primary">
            Nuevo hábito
          </a>
        </div>

        <div class="panelHabits" th:each="h : ${habitos}">
          <div class="habiTrackerItem">
            <div class="iconHabit">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-sport-shoe-icon lucide-sport-shoe"
              >
                <path d="m15 10.42 4.8-5.07" />
                <path d="M19 18h3" />
                <path
                  d="M9.5 22 21.414 9.415A2 2 0 0 0 21.2 6.4l-5.61-4.208A1 1 0 0 0 14 3v2a2 2 0 0 1-1.394 1.906L8.677 8.053A1 1 0 0 0 8 9c-.155 6.393-2.082 9-4 9a2 2 0 0 0 0 4h14"
                />
              </svg>
            </div>
            <div class="habitTitle">
              <p class="notihabit" th:text="${h.nombre}"></p>
              <small class="gray" th:text="${h.descripcion}"></small>
            </div>
            <div class="daysCount">
              <p>12</p>
              <p>Dias</p>
            </div>
            <div class="weekHabitsBx" th:attr="data-id=${h.id}">
              <div class="spancircleItem" th:each="dia : ${semanas[h.id]}">
                <span
                  th:class="${dia.completado} ? 'circle active' : 'circle'"
                ></span>
                <p th:text="${dia.dia}"></p>
              </div>
            </div>
            <div>
              <!--            <a th:href="@{/habitos/marcar/{id}(id=${h.id})}" class="btn btn-success btn-sm">-->
              <!--              Marcar hoy-->
              <!--            </a>-->
              <a
                href="#"
                th:attr="data-id=${h.id}"
                class="btn btn-success btn-sm btn-marcar"
              >
                Marcar hoy
              </a>
            </div>
          </div>
        </div>
      </div>
      <div>
        <div class="CalendarBox">
          <div class="calendarTittle">
            <strong> Calendario </strong>
            <div class="Mes">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-chevron-left-icon lucide-chevron-left"
              >
                <path d="m15 18-6-6 6-6" />
              </svg>
              <p>Abril</p>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-chevron-right-icon lucide-chevron-right"
              >
                <path d="m9 18 6-6-6-6" />
              </svg>
            </div>
          </div>

          <ul class="dayscount">
            <li class="empty"></li>
            <li class="empty"></li>

            <!--          <li th:each="dia : ${diasMes}"-->
            <!--              th:text="${dia}">-->
            <!--          </li>-->
            <li
              th:each="dia : ${diasMes}"
              th:text="${dia}"
              th:classappend="${diasMarcados.contains(dia)} ? 'activo' : ''"
            ></li>
          </ul>
        </div>
      </div>
    </section>
  </body>
</html>
