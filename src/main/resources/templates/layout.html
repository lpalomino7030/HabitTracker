<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content, script)">

<head>
  <title th:replace="${title}">Habit Tracker</title>
  <link rel="stylesheet" th:href="@{/css/estilo.css}" />
  <link rel="stylesheet" th:href="@{/css/calendar.css}" />

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
    rel="stylesheet" />
  <meta name="_csrf" th:content="${_csrf.token}" />
  <meta name="_csrf_header" th:content="${_csrf.headerName}" />
</head>

<body>
  <nav class="navbar">
    <div class="navTittle">

      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="lucide lucide-check-line-icon lucide-check-line">
        <path d="M20 4L9 15" />
        <path d="M21 19L3 19" />
        <path d="M9 15L4 10" />
      </svg>

      <p>Habit Tracker</p>

      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="lucide lucide-list-icon lucide-list">
        <path d="M3 5h.01" />
        <path d="M3 12h.01" />
        <path d="M3 19h.01" />
        <path d="M8 5h13" />
        <path d="M8 12h13" />
        <path d="M8 19h13" />
      </svg>
    </div>

    <form th:action="@{/logout}" method="post" style="display:inline;">

      <div class="outUser">
<p>Bienvenido, </p>
        <span th:text="${usuario.nombreUsuario}"></span>
        <div class="salirbtn">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="lucide lucide-door-open-icon lucide-door-open">
            <path d="M11 20H2" />
            <path d="M11 4.562v16.157a1 1 0 0 0 1.242.97L19 20V5.562a2 2 0 0 0-1.515-1.94l-4-1A2 2 0 0 0 11 4.561z" />
            <path d="M11 4H8a2 2 0 0 0-2 2v14" />
            <path d="M14 12h.01" />
            <path d="M22 20h-3" />
          </svg>
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <button type="submit">
            Salir
          </button>
        </div>
      </div>
    </form>
  </nav>

  <div class="container">
    <div class="sidebar bg-blue">
      <ul>
        <li>
          <a th:href="@{/habitos}" class="">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="lucide lucide-house-icon lucide-house">
              <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8" />
              <path
                d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            </svg>
            Resumen
          </a>
        </li>
        <li>
          <a th:href="@{/habitos/lista}">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="lucide lucide-blinds-icon lucide-blinds">
              <path d="M3 3h18" />
              <path d="M20 7H8" />
              <path d="M20 11H8" />
              <path d="M10 19h10" />
              <path d="M8 15h12" />
              <path d="M4 3v14" />
              <circle cx="4" cy="19" r="2" />
            </svg>
            Mis Habitos
          </a>
        </li>
        <li>
          <a th:href="@{/habitos/calendar}">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="lucide lucide-calendar-days-icon lucide-calendar-days">
              <path d="M8 2v4" />
              <path d="M16 2v4" />
              <rect width="18" height="18" x="3" y="4" rx="2" />
              <path d="M3 10h18" />
              <path d="M8 14h.01" />
              <path d="M12 14h.01" />
              <path d="M16 14h.01" />
              <path d="M8 18h.01" />
              <path d="M12 18h.01" />
              <path d="M16 18h.01" />
            </svg>
            Calendario
          </a>
        </li>
        <li>
          <a th:href="@{/habitos/stats}">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="lucide lucide-chart-no-axes-combined-icon lucide-chart-no-axes-combined">
              <path d="M12 16v5" />
              <path d="M16 14v7" />
              <path d="M20 10v11" />
              <path d="m22 3-8.646 8.646a.5.5 0 0 1-.708 0L9.354 8.354a.5.5 0 0 0-.707 0L2 15" />
              <path d="M4 18v3" />
              <path d="M8 14v7" />
            </svg>
            Estadisticas
          </a>
        </li>
<!--        <li>-->
<!--          <a th:href="@{/habitos/history}">-->
<!--            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"-->
<!--              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"-->
<!--              class="lucide lucide-history-icon lucide-history">-->
<!--              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />-->
<!--              <path d="M3 3v5h5" />-->
<!--              <path d="M12 7v5l4 2" />-->
<!--            </svg>-->
<!--            Historia-->
<!--          </a>-->
<!--        </li>-->
        <li>
          <a th:href="@{/habitos/config}">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="lucide lucide-cog-icon lucide-cog">
              <path d="M11 10.27 7 3.34" />
              <path d="m11 13.73-4 6.93" />
              <path d="M12 22v-2" />
              <path d="M12 2v2" />
              <path d="M14 12h8" />
              <path d="m17 20.66-1-1.73" />
              <path d="m17 3.34-1 1.73" />
              <path d="M2 12h2" />
              <path d="m20.66 17-1.73-1" />
              <path d="m20.66 7-1.73 1" />
              <path d="m3.34 17 1.73-1" />
              <path d="m3.34 7 1.73 1" />
              <circle cx="12" cy="12" r="2" />
              <circle cx="12" cy="12" r="8" />
            </svg>
            Configuracion
          </a>
        </li>
      </ul>
    </div>
    <div class="content">
      <div th:replace="${content}"></div>
    </div>
  </div>

  <script th:replace="${script}"></script>

</body>

</html>
